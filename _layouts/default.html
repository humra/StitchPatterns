<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>
    {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
  </title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="{{ page.description | default: site.description | escape }}"
  >

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <script src="{{ '/assets/js/site.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</head>

<body>
  <div class="announcement">
    Cross-stitch patterns, finished projects and downloadable files
  </div>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p class="footer-title">{{ site.title }}</p>
	  <p>Created by the Bubuus</p>
      <p>Cross-stitch patterns and finished projects.</p>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
</body>
</html>
